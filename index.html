<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>JOTIPS - Betting Tips & Predictions</title>
  <meta name="description" content="Free betting tips, predictions, and betting codes. Win with JOTIPS.">
  <meta property="og:title" content="JOTIPS - Betting Tips">
  <meta property="og:description" content="Free betting tips & predictions">
  <meta property="og:type" content="website">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#006994">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sea: #006994; --sea-light: #0088b0; --sea-dark: #004b6b;
      --grad: linear-gradient(135deg, #006994, #0088b0); --grad-dark: linear-gradient(135deg, #004b6b, #006994);
      --w: #e2edf7; --b: #e2edf7;
      --50: #0b1428; --100: #121e36; --200: #1a2c48; --300: #253b5a;
      --400: #5a7da0; --500: #7a9fc4; --600: #a0bdd6; --700: #c4d8ed; --800: #e2edf7;
      --shadow: 0 1px 2px rgba(0,0,0,.2), 0 1px 3px rgba(0,0,0,.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,.25), 0 2px 4px rgba(0,0,0,.2);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.3), 0 4px 10px rgba(0,0,0,.2);
      --shadow-xl: 0 20px 40px rgba(0,0,0,.35);
      --r: 14px; --rs: 10px;
      --tr: all .3s cubic-bezier(.4,0,.2,1);
    }
    html { scroll-behavior: smooth; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--50); color: var(--b); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .header { background: var(--grad); color: #fff; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 26px; font-weight: 900; letter-spacing: -.5px; display: flex; align-items: center; gap: 8px; }
    .logo span { font-weight: 400; font-size: 13px; opacity: .65; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,.15); padding: 4px 12px; border-radius: 20px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    .hero { background: var(--grad-dark); color: #fff; text-align: center; padding: 32px 20px 28px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.08) 0%, transparent 60%), radial-gradient(circle at 70% 50%, rgba(255,255,255,.05) 0%, transparent 50%); }
    .hero h1 { font-size: 26px; font-weight: 800; position: relative; }
    .hero h1 span { color: rgba(255,255,255,.5); font-weight: 400; }
    .hero p { font-size: 14px; opacity: .7; margin-top: 4px; position: relative; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px 20px; }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat-card { background: var(--100); border: 1px solid var(--200); border-radius: var(--rs); padding: 14px 12px; text-align: center; }
    .stat-card .num { font-size: 22px; font-weight: 800; }
    .stat-card .num.green { color: #4ade80; } .stat-card .num.red { color: #f87171; } .stat-card .num.blue { color: var(--sea-light); }
    .stat-card .label { font-size: 10px; color: var(--400); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* Controls */
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .search-box { flex: 1; min-width: 180px; padding: 10px 14px; border: 2px solid var(--200); border-radius: var(--rs); font-family: inherit; font-size: 14px; outline: none; background: var(--100); color: var(--800); transition: var(--tr); }
    .search-box:focus { border-color: var(--sea); }
    .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-tab { padding: 7px 14px; border: 1px solid var(--200); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--100); color: var(--500); transition: var(--tr); font-family: inherit; white-space: nowrap; }
    .filter-tab:hover { border-color: var(--400); color: var(--700); }
    .filter-tab.active { background: var(--grad); color: #fff; border-color: transparent; }
    .filter-tab .count { margin-left: 4px; font-size: 10px; opacity: .7; }

    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border: none; border-radius: var(--rs); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--tr); text-decoration: none; }
    .btn-sea { background: var(--grad); color: #fff; } .btn-sea:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-sea-outline { background: transparent; color: var(--sea); border: 2px solid var(--sea); } .btn-sea-outline:hover { background: var(--sea); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 7px; }

    .tips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }

    .tip-card { background: var(--100); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; transition: var(--tr); opacity: 0; transform: translateY(20px); animation: card-in .45s ease forwards; }
    .tip-card:hover { transform: translateY(-3px) !important; box-shadow: var(--shadow-xl); }
    @keyframes card-in { to { opacity: 1; transform: translateY(0); } }

    .tip-card-header { background: var(--grad); color: #fff; padding: 16px 20px; position: relative; overflow: hidden; }
    .tip-card-header::after { content: ''; position: absolute; top: -50%; right: -20%; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.06); }
    .tip-card-header .tip-name { font-size: 16px; font-weight: 700; line-height: 1.35; position: relative; padding-right: 85px; }
    .tip-card-header .tip-date { font-size: 12px; opacity: .75; margin-top: 4px; display: flex; align-items: center; gap: 5px; position: relative; }

    .result-badge { position: absolute; top: 14px; right: 16px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }
    .result-badge.pending { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); }
    .result-badge.won { background: #166534; color: #bbf7d0; }
    .result-badge.lost { background: #991b1b; color: #fecaca; }

    .score-badge { padding: 8px 16px; font-size: 13px; font-weight: 700; text-align: center; border-bottom: 1px solid var(--100); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .score-badge.score-live { background: rgba(239,68,68,.08); color: #ef4444; }
    .score-badge.score-fin { background: rgba(34,197,94,.08); color: #22c55e; }
    .score-badge.score-up { background: rgba(100,116,139,.08); color: var(--500); }

    .tip-card-body { padding: 16px 20px; }
    .tip-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--100); gap: 10px; }
    .tip-row:last-of-type { border-bottom: none; }
    .tip-label { font-size: 11px; font-weight: 600; color: var(--400); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
    .tip-value { font-size: 14px; font-weight: 600; color: var(--800); text-align: right; word-break: break-all; }

    .code-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .tip-value.code { font-family: 'Courier New', monospace; font-size: 15px; color: var(--sea-dark); font-weight: 800; letter-spacing: .2px; }
    .copy-btn { background: none; border: none; cursor: pointer; color: var(--400); padding: 4px; font-size: 15px; transition: var(--tr); border-radius: 6px; flex-shrink: 0; min-width: 32px; min-height: 32px; }
    .copy-btn:hover { color: var(--sea); background: var(--50); }
    .copy-btn.copied { color: #22c55e; }

    .tip-note { margin-top: 10px; padding: 10px 14px; background: var(--200); border-radius: var(--rs); font-size: 13px; color: var(--600); line-height: 1.6; border-left: 3px solid var(--sea-light); }

    .comments-section { margin-top: 10px; border-top: 1px solid var(--100); padding-top: 10px; }
    .comments-toggle { background: none; border: none; color: var(--500); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 0; min-height: 36px; }
    .comments-toggle:hover { color: var(--sea); }
    .comments-list { display: none; margin-top: 6px; }
    .comments-list.open { display: block; }
    .comment-item { padding: 6px 0; border-bottom: 1px solid var(--100); font-size: 13px; }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-weight: 600; color: var(--700); font-size: 12px; }
    .comment-text { color: var(--600); margin-top: 2px; }
    .comment-time { font-size: 11px; color: var(--400); margin-top: 2px; }
    .no-comments { font-size: 12px; color: var(--400); padding: 6px 0; }

    .comment-form { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
    .comment-form input, .comment-form textarea { padding: 8px 10px; border: 2px solid var(--200); border-radius: 6px; font-family: inherit; font-size: 13px; outline: none; transition: var(--tr); background: var(--50); color: var(--800); }
    .comment-form input:focus, .comment-form textarea:focus { border-color: var(--sea); }
    .comment-form textarea { resize: vertical; min-height: 36px; }
    .comment-form .row { display: flex; gap: 6px; }
    .comment-form .row input { flex: 1; }
    .comment-form .row .btn { flex-shrink: 0; }

    .tip-card-footer { padding: 10px 20px; border-top: 1px solid var(--100); display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }

    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
    .skeleton { background: var(--100); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
    .skeleton-head { height: 75px; background: linear-gradient(90deg, var(--100) 25%, var(--200) 50%, var(--100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-body { padding: 16px 20px; }
    .skeleton-line { height: 13px; border-radius: 8px; background: linear-gradient(90deg, var(--100) 25%, var(--200) 50%, var(--100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 10px; }
    .skeleton-line:last-child { width: 55%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .empty-state, .error-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon, .error-state .icon { font-size: 48px; margin-bottom: 14px; opacity: .5; }
    .empty-state h3, .error-state h3 { font-size: 18px; margin-bottom: 6px; color: var(--700); }
    .empty-state p, .error-state p { font-size: 14px; color: var(--400); margin-bottom: 14px; max-width: 360px; margin-left: auto; margin-right: auto; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px) scale(.9); background: var(--800); color: #fff; padding: 12px 22px; border-radius: var(--rs); font-size: 14px; font-weight: 500; box-shadow: var(--shadow-xl); opacity: 0; transition: all .4s cubic-bezier(.4,0,.2,1); z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

    .slider-wrap { position: relative; width: 100%; max-width: 1200px; margin: 0 auto; overflow: hidden; }
    .slider { position: relative; width: 100%; height: 260px; background: var(--200); overflow: hidden; }
    .slider img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: var(--100); padding: 6px; opacity: 0; transition: opacity .8s ease; }
    .slider img.active { opacity: 1; }
    .slider-dots { display: flex; justify-content: center; gap: 7px; padding: 8px; position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,.4)); }
    .slider-dots span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.4); cursor: pointer; transition: var(--tr); }
    .slider-dots span.active { background: #fff; transform: scale(1.3); }
    .slider-empty { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--400); font-size: 14px; background: var(--200); }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 500; align-items: center; justify-content: center; cursor: pointer; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }
    .lightbox .close-lb { position: absolute; top: 18px; right: 24px; color: #fff; font-size: 30px; cursor: pointer; background: none; border: none; }

    .back-top { position: fixed; bottom: 24px; right: 20px; width: 42px; height: 42px; border-radius: 50%; background: var(--grad); color: #fff; border: none; cursor: pointer; box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(20px); transition: var(--tr); z-index: 99; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .back-top.visible { opacity: 1; transform: translateY(0); }
    .back-top:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); }

    .footer { text-align: center; padding: 28px 20px; color: var(--400); font-size: 13px; border-top: 1px solid var(--200); margin-top: 36px; }
    .footer a { color: var(--sea); text-decoration: none; }
    .footer .views { font-size: 11px; opacity: .6; margin-top: 4px; }

    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--100); } ::-webkit-scrollbar-thumb { background: var(--300); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: var(--400); }
    #linksContainer a { min-height: 40px; }
    input, textarea, select { font-size: 16px; }

    @media (max-width: 640px) {
      .hero h1 { font-size: 20px; } .hero { padding: 24px 16px 20px; }
      .container { padding: 16px 12px; }
      .logo { font-size: 20px; } .logo span { font-size: 11px; }
      .section-title { font-size: 16px; }
      .tips-grid { grid-template-columns: 1fr; }
      .skeleton-grid { grid-template-columns: 1fr; }
      .header-inner { padding: 10px 14px; }
      .tip-card-header .tip-name { font-size: 14px; padding-right: 65px; }
      .result-badge { font-size: 9px; padding: 2px 8px; top: 10px; right: 10px; }
      .tip-card-body { padding: 12px 14px; }
      .tip-card-header { padding: 12px 14px; }
      .tip-card-footer { padding: 8px 14px; }
      .slider { height: 180px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-card .num { font-size: 18px; }
      .filter-tab { font-size: 11px; padding: 6px 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">JOTIPS <span>betting tips</span></div>
    <div class="header-right">
      <span class="live-badge"><span class="live-dot"></span> Live</span>
    </div>
  </div>
</div>

<div class="hero">
  <h1>Latest <span>Betting Tips</span></h1>
  <p>Free predictions & betting codes</p>
</div>

<div class="slider-wrap">
  <div class="slider" id="slider">
    <div class="slider-empty" id="sliderEmpty">No images yet</div>
  </div>
  <div class="slider-dots" id="sliderDots"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close-lb">&times;</button>
  <img id="lbImg" src="" alt="">
</div>

<div id="linksSection" style="display:none;max-width:1200px;margin:0 auto;padding:16px 20px 0">
  <div style="font-size:12px;font-weight:600;color:var(--500);margin-bottom:6px">🔗 Betting Companies</div>
  <div id="linksContainer" style="display:flex;flex-wrap:wrap;gap:6px"></div>
</div>

<div class="container">
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="num blue" id="statTotal">0</div><div class="label">Total Tips</div></div>
    <div class="stat-card"><div class="num green" id="statWon">0</div><div class="label">Won ✅</div></div>
    <div class="stat-card"><div class="num red" id="statLost">0</div><div class="label">Lost ❌</div></div>
    <div class="stat-card"><div class="num blue" id="statRate">0%</div><div class="label">Win Rate</div></div>
  </div>
  <div id="catStats" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px"></div>

    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search by company, name, or code..." oninput="filterTips()">
      <div class="filter-tabs" style="width:100%">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All <span class="count" id="countAll">0</span></button>
          <button class="filter-tab" data-filter="won" onclick="setFilter('won',this)">✅ Won <span class="count" id="countWon">0</span></button>
          <button class="filter-tab" data-filter="lost" onclick="setFilter('lost',this)">❌ Lost <span class="count" id="countLost">0</span></button>
          <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">⏳ Pending <span class="count" id="countPending">0</span></button>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
          <button class="filter-tab active" data-cat="all" onclick="setCategory('all',this)">📌 All</button>
          <button class="filter-tab" data-cat="football" onclick="setCategory('football',this)">⚽ Football</button>
          <button class="filter-tab" data-cat="basketball" onclick="setCategory('basketball',this)">🏀 Basketball</button>
          <button class="filter-tab" data-cat="tennis" onclick="setCategory('tennis',this)">🎾 Tennis</button>
          <button class="filter-tab" data-cat="other" onclick="setCategory('other',this)">📌 Other</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center">
          <select id="sortSelect" style="padding:7px 10px;border:2px solid var(--200);border-radius:7px;font-family:inherit;font-size:12px;background:var(--100);color:var(--700);outline:none" onchange="filterTips()">
            <option value="date">Sort by Date</option>
            <option value="odds">Sort by Odds</option>
            <option value="confidence">Sort by Confidence</option>
          </select>
          <button class="btn btn-xs btn-sea-outline" onclick="copyAllCodes()">📋 Copy Pending Codes</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--400);cursor:pointer">
            <input type="checkbox" id="showExpired" onchange="filterTips()" checked> Show expired
          </label>
        </div>
      </div>
    </div>

  <div id="tipsContainer"></div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div class="footer">
  JOTIPS &mdash; Betting Tips &bull; <a href="/admin.html" target="_blank">Admin</a> &bull; <a href="https://sportscore.com" target="_blank" rel="noopener">Live scores by SportScore</a>
  <div class="views" id="viewCount"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = window.location.origin + '/api/tips';
  const COMMENT_API = window.location.origin + '/api/comments';
  let tips = [], currentFilter = 'all', currentCategory = 'all', currentSearch = '';
  let scores = {};

  async function fetchLiveScores() {
    const sports = ['football', 'basketball', 'tennis'];
    const all = {};
    for (const sport of sports) {
      try {
        const r = await fetch('https://sportscore.com/api/widget/matches/?sport=' + sport + '&limit=50');
        if (!r.ok) continue;
        const data = await r.json();
        const list = data.matches || [];
        for (const m of list) {
          const key = (m.home_name||'').toLowerCase().trim() + '|' + (m.away_name||'').toLowerCase().trim();
          all[key] = m;
        }
      } catch(e) {}
    }
    scores = all;
    if (tips.length) filterTips();
  }

  async function loadTips() {
    const c = document.getElementById('tipsContainer');
    c.innerHTML = '<div class="skeleton-grid">' + Array(4).fill(
      '<div class="skeleton"><div class="skeleton-head"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-line" style="width:40%"></div></div></div>'
    ).join('') + '</div>';
    try {
      const r = await fetch(API);
      if (!r.ok) throw Error();
      tips = await r.json();
      if (!tips.length) {
        c.innerHTML = '<div class="empty-state"><div class="icon">🏀</div><h3>No tips yet</h3><p>Check back later for the latest betting tips and predictions</p></div>';
      } else {
        updateStats();
        filterTips();
      }

    } catch(e) {
      c.innerHTML = '<div class="error-state"><div class="icon">⚠️</div><h3>Could not load tips</h3><p>Server is offline. Try again later.</p><button class="btn btn-sea" onclick="loadTips()">Retry</button></div>';
    }
  }

  function updateStats() {
    const total = tips.length;
    const won = tips.filter(t => t.result === 'won').length;
    const lost = tips.filter(t => t.result === 'lost').length;
    const rate = total > 0 ? Math.round((won / (won + lost)) * 100) : 0;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statWon').textContent = won;
    document.getElementById('statLost').textContent = lost;
    document.getElementById('statRate').textContent = (won + lost) > 0 ? rate + '%' : '-';
    document.getElementById('countAll').textContent = total;
    document.getElementById('countWon').textContent = won;
    document.getElementById('countLost').textContent = lost;
    document.getElementById('countPending').textContent = tips.filter(t => (t.result||'pending') === 'pending').length;
    // Category stats
    const cats = ['football','basketball','tennis','other'];
    const catLabels = { football:'⚽ Football', basketball:'🏀 Basketball', tennis:'🎾 Tennis', other:'📌 Other' };
    const catEl = document.getElementById('catStats');
    catEl.innerHTML = cats.map(c => {
      const inCat = tips.filter(t => (t.category||'other') === c);
      if (!inCat.length) return '';
      const cWon = inCat.filter(t => t.result === 'won').length;
      const cLost = inCat.filter(t => t.result === 'lost').length;
      const cRate = (cWon + cLost) > 0 ? Math.round(cWon / (cWon + cLost) * 100) : 0;
      const pending = inCat.filter(t => (t.result||'pending') === 'pending').length;
      return '<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--100);border:1px solid var(--200);border-radius:20px;font-size:12px;color:var(--600)">' + (catLabels[c]||c) + ' ' + cWon + '✅ ' + cLost + '❌ <strong style="color:' + ((cWon+cLost)>0 ? '#4ade80' : 'var(--400)') + '">' + ((cWon+cLost) > 0 ? cRate + '%' : '-') + '</strong>' + (pending ? ' <span style="color:var(--400)">·</span> <span style="color:var(--400)">' + pending + ' ⏳</span>' : '') + '</span>';
    }).filter(Boolean).join('');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('[data-filter]').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterTips();
  }

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('[data-cat]').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterTips();
  }

  function filterTips() {
    currentSearch = document.getElementById('searchBox').value.toLowerCase().trim();
    const showExpired = document.getElementById('showExpired').checked;
    const sortVal = document.getElementById('sortSelect').value;
    const today = new Date(); today.setHours(23,59,59,0);
    let filtered = tips.filter(t => {
      if (currentFilter !== 'all' && (t.result || 'pending') !== currentFilter) return false;
      if (currentCategory !== 'all' && (t.category || 'other') !== currentCategory) return false;
      const tipDate = new Date(t.date + 'T23:59:59');
      if (!showExpired && tipDate < today) return false;
      if (currentSearch) {
        const searchable = (t.name + ' ' + t.company + ' ' + t.code).toLowerCase();
        if (searchable.indexOf(currentSearch) === -1) return false;
      }
      return true;
    });
    // Sort
    if (sortVal === 'odds') filtered.sort((a, b) => (parseFloat(b.odds) || 0) - (parseFloat(a.odds) || 0));
    else if (sortVal === 'confidence') filtered.sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
    else filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    // Featured first
    filtered.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
    const c = document.getElementById('tipsContainer');
    if (!filtered.length) {
      c.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No tips match</h3><p>Try a different search or filter</p></div>';
      return;
    }
    c.innerHTML = '<div class="tips-grid">' + filtered.map((t, i) => cardHTML(t, t.id, i)).join('') + '</div>';
  }

  function copyAllCodes() {
    const codes = tips.filter(t => (t.result || 'pending') === 'pending').map(t => t.code).join('\n');
    if (!codes) { showToast('No pending codes'); return; }
    navigator.clipboard.writeText(codes).then(() => showToast('Copied ' + tips.filter(t => (t.result||'pending')==='pending').length + ' codes!')).catch(() => showToast('Could not copy'));
  }

  function getScoreHTML(t) {
    if (!t.home_team && !t.away_team) return '';
    const key = (t.home_team||'').toLowerCase().trim() + '|' + (t.away_team||'').toLowerCase().trim();
    const m = scores[key];
    if (!m) return '';
    const sc = (m.home_score != null && m.away_score != null) ? m.home_score + '-' + m.away_score : '';
    const status = m.status || '';
    const cls = status === 'live' ? 'score-live' : (status === 'finished' ? 'score-fin' : 'score-up');
    const icon = status === 'live' ? '🔴' : (status === 'finished' ? '✅' : '📅');
    return '<div class="score-badge ' + cls + '">' + icon + ' ' + esc(t.home_team||'?') + ' ' + sc + ' ' + esc(t.away_team||'?') + ' <span style="font-size:10px;opacity:.7">' + status + '</span></div>';
  }

  function cardHTML(t, id, i) {
    const d = new Date(t.date);
    const ds = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const n = t.note ? `<div class="tip-note">${esc(t.note)}</div>` : '';
    const od = t.odds ? `<div class="tip-row"><span class="tip-label">🎯 Odds</span><span class="tip-value" style="color:#16a34a;font-weight:800">@ ${esc(t.odds)}</span></div>` : '';
    const result = t.result || 'pending';
    const badge = { pending: '⏳ Pending', won: '✅ Won', lost: '❌ Lost' };
    const cat = { football: '⚽', basketball: '🏀', tennis: '🎾', other: '📌' };
    const stars = '★'.repeat(t.confidence || 3) + '☆'.repeat(5 - (t.confidence || 3));
    const ft = t.featured ? '<span style="font-size:10px;background:rgba(255,255,255,.15);padding:2px 6px;border-radius:10px;margin-left:4px">🔥 Featured</span>' : '';
    const stk = t.stake ? `<div class="tip-row"><span class="tip-label">💰 Stake</span><span class="tip-value">KES ${parseFloat(t.stake).toLocaleString()}</span></div>` : '';
    const url = encodeURIComponent(window.location.href);
    const text = encodeURIComponent(`💰 ${t.name} - ${t.company}\nCode: ${t.code}\nOdds: ${t.odds || '-'}\nvia JOTIPS`);
    return `<div class="tip-card" style="animation-delay:${Math.min(i * .04, .35)}s">
      <div class="tip-card-header">
        <div class="tip-name">${cat[t.category]||'📌'} ${esc(t.name)}${ft} <span class="result-badge ${result}">${badge[result]}</span></div>
        <div class="tip-date">📅 ${ds} &nbsp; <span style="opacity:.7">${stars}</span></div>
      </div>
      ${getScoreHTML(t)}
      <div class="tip-card-body">
        <div class="tip-row"><span class="tip-label">🏢 Company</span><span class="tip-value">${esc(t.company)}</span></div>
        ${od}${stk}
        <div class="tip-row"><span class="tip-label">🔑 Code</span><div class="code-wrap"><span class="tip-value code">${esc(t.code)}</span><button class="copy-btn" onclick="copyCode('${esc(t.code)}',this,'${id}')" title="Copy code">📋</button></div></div>
        ${n}
        <div class="comments-section">
          <button class="comments-toggle" onclick="toggleComments('${id}', this)">💬 <span id="cc-${id}">0</span> comments</button>
          <div class="comments-list" id="cl-${id}">
            <div class="no-comments">Loading...</div>
          </div>
            <div class="comment-form">
            <div class="row">
              <input type="text" id="ca-${id}" placeholder="Your name" maxlength="30">
              <button class="btn btn-sea btn-xs" onclick="submitComment('${id}')">Send</button>
            </div>
            <textarea id="ct-${id}" placeholder="Write a comment..." maxlength="500" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="tip-card-footer">
        <a href="https://wa.me/?text=${text}" target="_blank" rel="noopener" class="btn btn-xs btn-sea-outline" title="Share on WhatsApp">📱 Share</a>
        <button class="btn btn-xs btn-sea-outline" onclick="downloadPoster('${id}')">📸 Poster</button>
      </div>
    </div>`;
  }

  function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

  function findTip(id) { return tips.find(t => t.id === id); }

  function copyCode(code, btn, tipId) {
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = '✓'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
      if (tipId) fetch(window.location.origin + '/api/analytics/tip-view/' + tipId, { method: 'POST' }).catch(() => {});
    }).catch(() => showToast('Could not copy'));
  }

  async function toggleComments(tipId, btn) {
    const list = document.getElementById('cl-' + tipId);
    if (list.classList.contains('open')) { list.classList.remove('open'); return; }
    list.classList.add('open');
    try {
      const r = await fetch(COMMENT_API + '/' + tipId);
      const comments = await r.json();
      const count = document.getElementById('cc-' + tipId);
      count.textContent = comments.length;
      if (!comments.length) {
        list.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>';
      } else {
        list.innerHTML = comments.map(c => `
          <div class="comment-item">
            <div class="comment-author">👤 ${esc(c.author)}</div>
            <div class="comment-text">${esc(c.text)}</div>
            <div class="comment-time">${timeAgo(c.created)}</div>
          </div>
        `).join('');
      }
    } catch(e) {
      list.innerHTML = '<div class="no-comments">Could not load comments</div>';
    }
  }

  async function submitComment(tipId) {
    const author = document.getElementById('ca-' + tipId).value.trim();
    const text = document.getElementById('ct-' + tipId).value.trim();
    if (!author || !text) { showToast('Enter your name and comment'); return; }
    try {
      const r = await fetch(COMMENT_API + '/' + tipId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author, text })
      });
      if (!r.ok) throw Error();
      document.getElementById('ct-' + tipId).value = '';
      showToast('Comment posted!');
      const btn = document.querySelector(`.comments-toggle[onclick*="'${tipId}'"]`);
      if (btn) toggleComments(tipId, btn);
    } catch(e) { showToast('Failed to post comment'); }
  }

  function timeAgo(dateStr) {
    const now = Date.now(), d = new Date(dateStr).getTime();
    const sec = Math.floor((now - d) / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    const days = Math.floor(hr / 24);
    return days + 'd ago';
  }

  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('visible', window.scrollY > 400);
  });

  function downloadPoster(id) {
    const tip = findTip(id); if (!tip) return;
    const c = document.createElement('canvas'), x = c.getContext('2d');
    const w = 800, h = 1000; c.width = w; c.height = h; const p = 40;
    const d = new Date(tip.date), ds = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const g = x.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, '#006994'); g.addColorStop(.5, '#0088b0'); g.addColorStop(1, '#00557a');
    x.fillStyle = g; x.fillRect(0, 0, w, h);
    x.fillStyle = 'rgba(255,255,255,.04)';
    x.beginPath(); x.arc(100, 100, 220, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(680, 920, 280, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(400, 500, 380, 0, Math.PI * 2); x.fill();
    x.fillStyle = 'rgba(255,255,255,.25)'; x.font = 'bold 15px Inter, sans-serif'; x.textAlign = 'left';
    x.fillText('JOTIPS', p, 65);
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '13px Inter, sans-serif'; x.textAlign = 'right';
    x.fillText(ds, w - p, 65);
    x.strokeStyle = 'rgba(255,255,255,.1)'; x.lineWidth = 1;
    x.beginPath(); x.moveTo(p, 85); x.lineTo(w - p, 85); x.stroke();
    x.fillStyle = '#fff'; x.textAlign = 'center'; x.font = 'bold 38px Inter, sans-serif';
    const nl = wrap(x, tip.name, w - p * 2, 38); let y = 180;
    for (const l of nl) { x.fillText(l, w / 2, y); y += 48; }
    y = Math.max(y + 16, 260);
    x.fillStyle = 'rgba(255,255,255,.12)'; rRect(x, w / 2 - 100, y - 26, 200, 36, 18); x.fill();
    x.fillStyle = 'rgba(255,255,255,.9)'; x.font = 'bold 13px Inter, sans-serif';
    x.fillText('BETTING TIP', w / 2, y - 2); y += 40;
    const hasOdds = tip.odds ? 45 : 0;
    const cx = p + 20, cw = w - p * 2 - 40, cy = y, ch = 180 + hasOdds;
    x.fillStyle = 'rgba(255,255,255,.08)'; rRect(x, cx, cy, cw, ch, 16); x.fill();
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif'; x.textAlign = 'left';
    x.fillText('BETTING COMPANY', cx + 30, cy + 35);
    x.fillStyle = '#fff'; x.font = 'bold 22px Inter, sans-serif';
    x.fillText(tip.company, cx + 30, cy + 65);
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
    x.fillText('BETTING CODE', cx + 30, cy + 105);
    x.fillStyle = '#fff'; x.font = 'bold 34px "Courier New", monospace';
    x.fillText(tip.code, cx + 30, cy + 148);
    if (tip.odds) {
      x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
      x.fillText('TOTAL ODDS', cx + 30, cy + 195);
      x.fillStyle = '#fff'; x.font = 'bold 28px Inter, sans-serif';
      x.fillText('@ ' + tip.odds, cx + 30, cy + 225);
    }
    let ny = cy + ch + 30;
    if (tip.note) {
      x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
      x.fillText('NOTE', cx, ny); ny += 22;
      x.fillStyle = 'rgba(255,255,255,.85)'; x.font = '15px Inter, sans-serif';
      for (const l of wrap(x, tip.note, cw, 15)) { x.fillText(l, cx, ny); ny += 22; }
    }
    const result = tip.result || 'pending';
    if (result !== 'pending') {
      ny += 10;
      x.fillStyle = result === 'won' ? '#4ade80' : '#f87171';
      x.font = 'bold 22px Inter, sans-serif'; x.textAlign = 'center';
      x.fillText(result === 'won' ? '✅ WON' : '❌ LOST', w / 2, ny + 20);
    }
    x.fillStyle = 'rgba(255,255,255,.25)'; x.font = '11px Inter, sans-serif'; x.textAlign = 'center';
    x.fillText('JOTIPS — Betting Tips & Predictions', w / 2, h - 30);
    const a = document.createElement('a');
    a.download = 'jotips-' + tip.name.replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 30) + '.png';
    a.href = c.toDataURL('image/png'); a.click();
    showToast('Poster downloaded!');
  }

  function rRect(x, px, py, w, h, r) {
    x.beginPath(); x.moveTo(px + r, py); x.lineTo(px + w - r, py);
    x.quadraticCurveTo(px + w, py, px + w, py + r); x.lineTo(px + w, py + h - r);
    x.quadraticCurveTo(px + w, py + h, px + w - r, py + h); x.lineTo(px + r, py + h);
    x.quadraticCurveTo(px, py + h, px, py + h - r); x.lineTo(px, py + r);
    x.quadraticCurveTo(px, py, px + r, py); x.closePath();
  }

  function wrap(x, t, mw) {
    const ws = t.split(' '), ls = []; let cur = '';
    for (const w of ws) { const test = cur ? cur + ' ' + w : w; if (x.measureText(test).width > mw && cur) { ls.push(cur); cur = w; } else { cur = test; } }
    if (cur) ls.push(cur); return ls.length ? ls : [t];
  }

  function showToast(m) {
    const e = document.getElementById('toast'); e.textContent = m; e.classList.add('show');
    clearTimeout(window._t); window._t = setTimeout(() => e.classList.remove('show'), 2500);
  }

  let slideIndex = 0, slideTimer = null;
  async function loadSlider() {
    try {
      const r = await fetch(window.location.origin + '/api/images');
      if (!r.ok) throw Error();
      const files = await r.json();
      const slider = document.getElementById('slider');
      const dots = document.getElementById('sliderDots');
      if (!files.length) { slider.innerHTML = '<div class="slider-empty">No images yet</div>'; dots.innerHTML = ''; return; }
      slider.innerHTML = files.map((f, i) => `<img src="/uploads/${f}" class="${i === 0 ? 'active' : ''}" alt="" loading="lazy">`).join('');
      slider.onclick = function() { const img = this.querySelector('.active'); if (img) openLightbox(img.src); };
      dots.innerHTML = files.map((f, i) => `<span class="${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>`).join('');
      slideIndex = 0;
      startSlideShow();
    } catch(e) {}
  }

  function startSlideShow() {
    clearInterval(slideTimer);
    slideTimer = setInterval(() => {
      const imgs = document.querySelectorAll('.slider img');
      const dots = document.querySelectorAll('.slider-dots span');
      if (!imgs.length) return;
      imgs.forEach(i => i.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      slideIndex = (slideIndex + 1) % imgs.length;
      imgs[slideIndex].classList.add('active');
      if (dots[slideIndex]) dots[slideIndex].classList.add('active');
    }, 4000);
  }

  function goToSlide(n) {
    clearInterval(slideTimer);
    const imgs = document.querySelectorAll('.slider img');
    const dots = document.querySelectorAll('.slider-dots span');
    if (!imgs.length) return;
    imgs.forEach(i => i.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    slideIndex = n;
    imgs[slideIndex].classList.add('active');
    if (dots[slideIndex]) dots[slideIndex].classList.add('active');
    startSlideShow();
  }

  function openLightbox(src) {
    document.getElementById('lbImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  fetch(window.location.origin + '/api/analytics/view', { method: 'POST' }).catch(() => {});

  fetch(window.location.origin + '/api/analytics').then(r => r.json()).then(a => {
    if (a.views > 0) document.getElementById('viewCount').textContent = '👁 ' + a.views + ' views';
  }).catch(() => {});

  async function loadLinks() {
    try {
      const r = await fetch(window.location.origin + '/api/links');
      if (!r.ok) throw Error();
      const links = await r.json();
      const section = document.getElementById('linksSection');
      const container = document.getElementById('linksContainer');
      if (!links.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = links.map(l =>
        `<a href="${escAttr(l.url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;background:var(--100);border:1px solid var(--200);border-radius:var(--rs);font-size:12px;font-weight:600;color:var(--700);text-decoration:none;transition:var(--tr)">${esc(l.name)} ↗</a>`
      ).join('');
    } catch(e) {}
  }
  function escAttr(t) { return t.replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  fetchLiveScores().then(() => loadTips());
  setInterval(fetchLiveScores, 60000);
  loadSlider();
  loadLinks();
</script>
</body>
</html>
