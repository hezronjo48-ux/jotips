<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOTIPS - Betting Tips & Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sea: #006994; --sea-light: #0088b0; --sea-dark: #004b6b; --sea-glow: #00a3d4;
      --grad: linear-gradient(135deg, #006994, #0088b0);
      --grad-dark: linear-gradient(135deg, #004b6b, #006994);
      --w: #fff; --b: #0f172a;
      --50: #f8fafc; --100: #f1f5f9; --200: #e2e8f0; --300: #cbd5e1;
      --400: #94a3b8; --500: #64748b; --600: #475569; --700: #334155; --800: #1e293b;
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.06);
      --shadow-xl: 0 20px 40px rgba(0,0,0,.12);
      --r: 14px; --rs: 10px;
      --tr: all .3s cubic-bezier(.4,0,.2,1);
    }
    html { scroll-behavior: smooth; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--50); color: var(--b); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* Header */
    .header { background: var(--grad); color: #fff; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 26px; font-weight: 900; letter-spacing: -.5px; }
    .logo span { font-weight: 400; font-size: 13px; opacity: .65; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,.15); padding: 4px 12px; border-radius: 20px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    /* Hero */
    .hero { background: var(--grad-dark); color: #fff; text-align: center; padding: 40px 20px 36px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.08) 0%, transparent 60%), radial-gradient(circle at 70% 50%, rgba(255,255,255,.05) 0%, transparent 50%); }
    .hero h1 { font-size: 28px; font-weight: 800; position: relative; }
    .hero h1 span { color: rgba(255,255,255,.5); font-weight: 400; }
    .hero p { font-size: 14px; opacity: .7; margin-top: 6px; position: relative; }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

    /* Controls bar */
    .controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .controls-left { display: flex; align-items: center; gap: 10px; }
    .section-title { font-size: 20px; font-weight: 800; color: var(--sea-dark); }
    .tip-count-badge { font-size: 12px; font-weight: 600; background: var(--100); color: var(--500); padding: 2px 10px; border-radius: 20px; }
    .controls-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--400); }
    .controls-right button { background: none; border: none; cursor: pointer; color: var(--sea); font-size: 16px; padding: 4px; transition: var(--tr); }
    .controls-right button:hover { transform: rotate(60deg); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: var(--rs); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--tr); text-decoration: none; }
    .btn-sea { background: var(--grad); color: #fff; }
    .btn-sea:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-sea-outline { background: transparent; color: var(--sea); border: 2px solid var(--sea); }
    .btn-sea-outline:hover { background: var(--sea); color: #fff; }
    .btn-ghost { background: transparent; color: var(--600); }
    .btn-ghost:hover { background: var(--100); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Tips Grid */
    .tips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    /* Card */
    .tip-card { background: #fff; border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; transition: var(--tr); opacity: 0; transform: translateY(20px); animation: card-in .5s ease forwards; }
    .tip-card:hover { transform: translateY(-4px) !important; box-shadow: var(--shadow-xl); }
    @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
    .tip-card:nth-child(1) { animation-delay: .05s; }
    .tip-card:nth-child(2) { animation-delay: .1s; }
    .tip-card:nth-child(3) { animation-delay: .15s; }
    .tip-card:nth-child(4) { animation-delay: .2s; }
    .tip-card:nth-child(5) { animation-delay: .25s; }
    .tip-card:nth-child(6) { animation-delay: .3s; }
    .tip-card:nth-child(7) { animation-delay: .35s; }
    .tip-card:nth-child(8) { animation-delay: .4s; }
    .tip-card:nth-child(n+9) { animation-delay: .45s; }

    .tip-card-header { background: var(--grad); color: #fff; padding: 18px 22px; position: relative; overflow: hidden; }
    .tip-card-header::after { content: ''; position: absolute; top: -50%; right: -20%; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.06); }
    .tip-card-header .tip-name { font-size: 17px; font-weight: 700; line-height: 1.35; position: relative; }
    .tip-card-header .tip-date { font-size: 12px; opacity: .75; margin-top: 5px; display: flex; align-items: center; gap: 5px; position: relative; }

    .tip-card-body { padding: 18px 22px; }
    .tip-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--100); gap: 12px; }
    .tip-row:last-of-type { border-bottom: none; }
    .tip-label { font-size: 11px; font-weight: 600; color: var(--400); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    .tip-value { font-size: 14px; font-weight: 600; color: var(--800); text-align: right; word-break: break-all; }

    .code-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .tip-value.code { font-family: 'Courier New', monospace; font-size: 16px; color: var(--sea-dark); font-weight: 800; letter-spacing: .3px; }
    .copy-btn { background: none; border: none; cursor: pointer; color: var(--400); padding: 4px; font-size: 16px; transition: var(--tr); border-radius: 6px; flex-shrink: 0; }
    .copy-btn:hover { color: var(--sea); background: var(--50); }
    .copy-btn.copied { color: #22c55e; }

    .tip-note { margin-top: 12px; padding: 10px 14px; background: var(--50); border-radius: var(--rs); font-size: 13px; color: var(--600); line-height: 1.6; border-left: 3px solid var(--sea-light); }

    .tip-card-footer { padding: 12px 22px; border-top: 1px solid var(--100); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

    /* Skeleton */
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .skeleton { background: #fff; border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
    .skeleton-head { height: 80px; background: linear-gradient(90deg, var(--100) 25%, var(--200) 50%, var(--100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-body { padding: 18px 22px; }
    .skeleton-line { height: 14px; border-radius: 8px; background: linear-gradient(90deg, var(--100) 25%, var(--200) 50%, var(--100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 12px; }
    .skeleton-line:last-child { width: 60%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* States */
    .empty-state, .error-state { text-align: center; padding: 80px 20px; }
    .empty-state .icon, .error-state .icon { font-size: 56px; margin-bottom: 16px; opacity: .5; }
    .empty-state h3, .error-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--700); }
    .empty-state p, .error-state p { font-size: 14px; color: var(--400); margin-bottom: 16px; max-width: 400px; margin-left: auto; margin-right: auto; }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px) scale(.9); background: var(--800); color: #fff; padding: 12px 24px; border-radius: var(--rs); font-size: 14px; font-weight: 500; box-shadow: var(--shadow-xl); opacity: 0; transition: all .4s cubic-bezier(.4,0,.2,1); z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

    /* Back to top */
    .back-top { position: fixed; bottom: 30px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: var(--grad); color: #fff; border: none; cursor: pointer; box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(20px); transition: var(--tr); z-index: 99; font-size: 18px; }
    .back-top.visible { opacity: 1; transform: translateY(0); }
    .back-top:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); }

    /* Footer */
    .footer { text-align: center; padding: 32px 20px; color: var(--400); font-size: 13px; border-top: 1px solid var(--200); margin-top: 40px; }
    .footer a { color: var(--sea); text-decoration: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--100); }
    ::-webkit-scrollbar-thumb { background: var(--300); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--400); }

    @media (max-width: 640px) {
      .hero h1 { font-size: 22px; }
      .hero { padding: 28px 16px 24px; }
      .container { padding: 20px 12px; }
      .logo { font-size: 22px; } .logo span { font-size: 12px; }
      .section-title { font-size: 17px; }
      .tips-grid { grid-template-columns: 1fr; }
      .skeleton-grid { grid-template-columns: 1fr; }
      .header-inner { padding: 12px 16px; }
      .live-badge { font-size: 10px; padding: 3px 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">JOTIPS <span>betting tips</span></div>
    <div class="header-right">
      <span class="live-badge"><span class="live-dot"></span> Live</span>
    </div>
  </div>
</div>

<div class="hero">
  <h1>Latest <span>Betting Tips</span></h1>
  <p>Free predictions & betting codes</p>
</div>

<div class="container">
  <div class="controls">
    <div class="controls-left">
      <h2 class="section-title">All Tips</h2>
      <span class="tip-count-badge" id="tipCount">0</span>
    </div>
    <div class="controls-right">
      <span id="lastUpdated">Just now</span>
      <button onclick="loadTips()" title="Refresh">↻</button>
    </div>
  </div>

  <div id="tipsContainer"></div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div class="footer">
  JOTIPS &mdash; Betting Tips & Predictions &bull; <a href="/admin.html" target="_blank">Admin</a>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = window.location.origin + '/api/tips';
  let tips = [];

  async function loadTips() {
    const c = document.getElementById('tipsContainer');
    c.innerHTML = '<div class="skeleton-grid">' + Array(4).fill(`
      <div class="skeleton">
        <div class="skeleton-head"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line" style="width:75%"></div>
          <div class="skeleton-line" style="width:40%"></div>
        </div>
      </div>
    `).join('') + '</div>';

    try {
      const r = await fetch(API);
      if (!r.ok) throw Error('HTTP ' + r.status);
      tips = await r.json();
      if (!tips.length) {
        c.innerHTML = '<div class="empty-state"><div class="icon">🏀</div><h3>No tips yet</h3><p>Check back later for the latest betting tips and predictions</p></div>';
      } else {
        c.innerHTML = '<div class="tips-grid">' + tips.map((t, i) => cardHTML(t, t.id, i)).join('') + '</div>';
      }
      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('tipCount').textContent = tips.length;
    } catch(e) {
      c.innerHTML = '<div class="error-state"><div class="icon">⚠️</div><h3>Could not load tips</h3><p>Server is offline. Try again later.</p><button class="btn btn-sea" onclick="loadTips()">Retry</button></div>';
    }
  }

  function cardHTML(t, id, i) {
    const d = new Date(t.date);
    const ds = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const n = t.note ? `<div class="tip-note">${esc(t.note)}</div>` : '';
    const od = t.odds ? `<div class="tip-row"><span class="tip-label">🎯 Odds</span><span class="tip-value" style="color:#16a34a;font-weight:800">${esc(t.odds)}</span></div>` : '';
    return `<div class="tip-card" style="animation-delay:${Math.min(i * .05, .4)}s">
      <div class="tip-card-header"><div class="tip-name">${esc(t.name)}</div><div class="tip-date">📅 ${ds}</div></div>
      <div class="tip-card-body">
        <div class="tip-row"><span class="tip-label">🏢 Company</span><span class="tip-value">${esc(t.company)}</span></div>
        ${od}
        <div class="tip-row"><span class="tip-label">🔑 Code</span><div class="code-wrap"><span class="tip-value code">${esc(t.code)}</span><button class="copy-btn" onclick="copyCode('${esc(t.code)}',this)" title="Copy code">📋</button></div></div>
        ${n}
      </div>
      <div class="tip-card-footer">
        <button class="btn btn-sm btn-sea-outline" onclick="downloadPoster('${id}')">📸 Poster</button>
      </div>
    </div>`;
  }

  function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

  function findTip(id) { return tips.find(t => t.id === id); }

  function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
    }).catch(() => showToast('Could not copy'));
  }

  // Scroll to top button
  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('visible', window.scrollY > 400);
  });

  // Poster
  function downloadPoster(id) {
    const tip = findTip(id); if (!tip) return;
    const c = document.createElement('canvas'), x = c.getContext('2d');
    const w = 800, h = 1000; c.width = w; c.height = h; const p = 40;
    const d = new Date(tip.date), ds = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

    const g = x.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, '#006994'); g.addColorStop(.5, '#0088b0'); g.addColorStop(1, '#00557a');
    x.fillStyle = g; x.fillRect(0, 0, w, h);

    x.fillStyle = 'rgba(255,255,255,.04)';
    x.beginPath(); x.arc(100, 100, 220, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(680, 920, 280, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(400, 500, 380, 0, Math.PI * 2); x.fill();

    x.fillStyle = 'rgba(255,255,255,.25)'; x.font = 'bold 15px Inter, sans-serif'; x.textAlign = 'left';
    x.fillText('JOTIPS', p, 65);
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '13px Inter, sans-serif'; x.textAlign = 'right';
    x.fillText(ds, w - p, 65);

    x.strokeStyle = 'rgba(255,255,255,.1)'; x.lineWidth = 1;
    x.beginPath(); x.moveTo(p, 85); x.lineTo(w - p, 85); x.stroke();

    x.fillStyle = '#fff'; x.textAlign = 'center'; x.font = 'bold 38px Inter, sans-serif';
    const nl = wrap(x, tip.name, w - p * 2, 38); let y = 180;
    for (const l of nl) { x.fillText(l, w / 2, y); y += 48; }

    y = Math.max(y + 16, 260);
    x.fillStyle = 'rgba(255,255,255,.12)'; rRect(x, w / 2 - 100, y - 26, 200, 36, 18); x.fill();
    x.fillStyle = 'rgba(255,255,255,.9)'; x.font = 'bold 13px Inter, sans-serif';
    x.fillText('BETTING TIP', w / 2, y - 2); y += 40;

    const hasOdds = tip.odds ? 45 : 0;
    const cx = p + 20, cw = w - p * 2 - 40, cy = y, ch = 180 + hasOdds;
    x.fillStyle = 'rgba(255,255,255,.08)'; rRect(x, cx, cy, cw, ch, 16); x.fill();
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif'; x.textAlign = 'left';
    x.fillText('BETTING COMPANY', cx + 30, cy + 35);
    x.fillStyle = '#fff'; x.font = 'bold 22px Inter, sans-serif';
    x.fillText(tip.company, cx + 30, cy + 65);
    x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
    x.fillText('BETTING CODE', cx + 30, cy + 105);
    x.fillStyle = '#fff'; x.font = 'bold 34px "Courier New", monospace';
    x.fillText(tip.code, cx + 30, cy + 148);
    if (tip.odds) {
      x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
      x.fillText('TOTAL ODDS', cx + 30, cy + 195);
      x.fillStyle = '#fff'; x.font = 'bold 28px Inter, sans-serif';
      x.fillText('@ ' + tip.odds, cx + 30, cy + 225);
    }

    let ny = cy + ch + 30;
    if (tip.note) {
      x.fillStyle = 'rgba(255,255,255,.5)'; x.font = '12px Inter, sans-serif';
      x.fillText('NOTE', cx, ny); ny += 22;
      x.fillStyle = 'rgba(255,255,255,.85)'; x.font = '15px Inter, sans-serif';
      for (const l of wrap(x, tip.note, cw, 15)) { x.fillText(l, cx, ny); ny += 22; }
    }

    x.fillStyle = 'rgba(255,255,255,.25)'; x.font = '11px Inter, sans-serif'; x.textAlign = 'center';
    x.fillText('JOTIPS — Betting Tips & Predictions', w / 2, h - 30);

    const a = document.createElement('a');
    a.download = `jotips-${tip.name.replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 30)}.png`;
    a.href = c.toDataURL('image/png'); a.click();
    showToast('Poster downloaded!');
  }

  function rRect(x, px, py, w, h, r) {
    x.beginPath(); x.moveTo(px + r, py); x.lineTo(px + w - r, py);
    x.quadraticCurveTo(px + w, py, px + w, py + r); x.lineTo(px + w, py + h - r);
    x.quadraticCurveTo(px + w, py + h, px + w - r, py + h); x.lineTo(px + r, py + h);
    x.quadraticCurveTo(px, py + h, px, py + h - r); x.lineTo(px, py + r);
    x.quadraticCurveTo(px, py, px + r, py); x.closePath();
  }

  function wrap(x, t, mw) {
    const ws = t.split(' '), ls = []; let cur = '';
    for (const w of ws) {
      const test = cur ? cur + ' ' + w : w;
      if (x.measureText(test).width > mw && cur) { ls.push(cur); cur = w; } else { cur = test; }
    }
    if (cur) ls.push(cur);
    return ls.length ? ls : [t];
  }

  function showToast(m) {
    const e = document.getElementById('toast'); e.textContent = m; e.classList.add('show');
    clearTimeout(window._t); window._t = setTimeout(() => e.classList.remove('show'), 2500);
  }

  loadTips();
</script>
</body>
</html>
